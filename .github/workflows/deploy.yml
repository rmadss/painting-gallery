# GitHub Actions — Deploy to GitHub Pages
#
# Triggers on every push to the `main` branch.
# Since this is a pure static site (no build step), the workflow simply
# uploads the repo contents and deploys them via the official Pages action.
#
# SETUP STEPS (one-time):
#   1. Go to your repo on GitHub → Settings → Pages
#   2. Under "Build and deployment", set Source to "GitHub Actions"
#   3. Push to main — this workflow will run automatically.
#
# Your site will be live at: https://<your-username>.github.io/<repo-name>/
#
# IMPORTANT — if your site is at a subdirectory (e.g. /painting-website/),
# update BASE_PATH in data/paintings.js:
#   const BASE_PATH = "/painting-website";

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow Pages deployment
permissions:
  contents: read
  pages:    write
  id-token: write

# Only allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # No build step needed — upload the repo root directly
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."   # entire repo root is the website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
